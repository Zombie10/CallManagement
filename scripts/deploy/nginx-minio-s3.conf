# Append inside the paymercadogo.com HTTPS server { } block (before location /).
# LiveKit Cloud Egress: path-style S3 at RECORDINGS_S3_ENDPOINT=https://paymercadogo.com
# (Do NOT use /s3/ prefix — AWS SigV4 breaks when nginx strips the path prefix.)

    location ^~ /callmgmt-recordings/ {
        proxy_pass http://127.0.0.1:9000/callmgmt-recordings/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600;
    }

    # Legacy browser path (optional reads)
    location /s3/ {
        proxy_pass http://127.0.0.1:9000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 0;
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 600;
    }